<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa e Bola - Silksong Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --silk-green: #2d4c3b;
            --silk-light: #77a88d;
            --text-silver: #e0e0e0;
        }

        /* CURSOR PERSONALIZADO */
        * {
            cursor: url('Normal.cur'), auto !important;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #05070a;
            color: var(--text-silver);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            height: 100vh;
        }

        #viewport { position: relative; width: 100vw; height: 100vh; }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            visibility: hidden;
            background-size: cover;
            background-position: center;
        }

        .slide.active { visibility: visible; z-index: 1; }
        .slide.next { visibility: visible; z-index: 2; clip-path: inset(0 100% 0 0); }

        #slide-0 { background-image: url('hk_fundo.webp'); }
        #slide-1 { background-image: url('fundo_silksong.jpg'); }

        .capa-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 5px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .img-titulo { max-width: 550px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }

        .credits {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #fff;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 85%;
            max-width: 1100px;
            padding: 30px;
            background: rgba(13, 26, 19, 0.9);
            border: 2px solid var(--silk-green);
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--silk-green);
            padding: 15px;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--silk-light);
            background: rgba(45, 76, 59, 0.3);
        }

        .card h3 { font-family: 'Cinzel', serif; color: var(--silk-light); margin: 0 0 8px 0; font-size: 1.2rem; }
        .card p { font-size: 1.1rem; line-height: 1.2; margin: 0; opacity: 0.9; }

        #hornet-sprite {
            position: absolute;
            bottom: 10%;
            left: -300px;
            height: 260px;
            z-index: 100;
            pointer-events: none;
            display: none;
            transform: scaleX(-1);
        }

        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 200;
            display: none;
            justify-content: center; align-items: center;
        }

        .modal-box {
            background: #0a0f0d;
            padding: 60px;
            width: 800px;
            min-height: 400px;
            border: 2px solid var(--silk-green);
            text-align: center;
            position: relative;
        }

        .modal-box h2 { font-family: 'Cinzel Decorative'; font-size: 2.8rem; color: var(--silk-light); margin-top: 0; }
        
        /* Ajuste do texto para o efeito typewriter */
        #m-text { 
            font-size: 2.2rem; 
            line-height: 1.4; 
            color: #cbd5d0;
            min-height: 150px;
            white-space: pre-wrap; /* Mantém as quebras de linha das regras */
        }

        .btn-action {
            font-family: 'Cinzel', serif;
            background: transparent;
            border: 1px solid var(--silk-light);
            color: white;
            padding: 12px 30px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-action:hover { background: var(--silk-light); color: black; box-shadow: 0 0 15px var(--silk-light); }

        .nav-modal-btn { 
            position: absolute; right: -80px; top: 50%; transform: translateY(-50%); 
            font-size: 3rem; background: none; border: none; color: var(--silk-light); 
        }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="bg-music" loop>
        <source src="hk_theme.mp3" type="audio/mpeg">
    </audio>

    <div id="viewport">
        <section class="slide active" id="slide-0">
            <div class="capa-container">
                <img src="titulo.png" alt="Caixa e Bola" class="img-titulo">
                <div class="credits">
                    JOAQUIM, VITOR, JOÃO P. NATAL E ADRIAN<br>
                    SÉRIE: 9 D<br>
                    PROFESSORA: ROBERTA
                </div>
                <button class="btn-action" style="margin-top: 30px;" onclick="changeSlide(1)">INICIAR APRESENTAÇÃO</button>
            </div>
        </section>

        <section class="slide" id="slide-1">
            <button class="btn-action" style="position:fixed; bottom:30px; left:30px; z-index:10;" onclick="changeSlide(0)">← VOLTAR À CAPA</button>
            <div class="content-grid" id="grid"></div>
        </section>
    </div>

    <img id="hornet-sprite" src="hornet/Hornet Boss Cln_218.png">

    <div id="modal">
        <div class="modal-box">
            <button onclick="closeModal()" style="position:absolute; top:20px; right:20px; color:white; background:none; border:none; font-size: 1.5rem;">[ X ]</button>
            <h2 id="m-title">Título</h2>
            <p id="m-text"></p> <button class="nav-modal-btn" onclick="nextModal()">→</button>
        </div>
    </div>

    <script>
        const framesRun = ["Hornet Boss Cln_218.png", "Hornet Boss Cln_219.png", "Hornet Boss Cln_220.png", "Hornet Boss Cln_221.png", "Hornet Boss Cln_222.png", "Hornet Boss Cln_223.png", "Hornet Boss Cln_224.png", "Hornet Boss Cln_225.png"];
        
        const dados = [
            { t: "1. INTRODUÇÃO", d: "A proposta deste trabalho é a criação de uma nova brincadeira chamada \"Caixa e Bola\". Ela foi criada de forma espontânea por dois primos e combina elementos de esportes como pingue-pongue e beisebol. O objetivo é desenvolver uma atividade simples, divertida e acessível, que possa ser praticada por diferentes pessoas." },
            { t: "2. ORIGEM DA BRINCADEIRA", d: "A brincadeira surgiu de forma inesperada, quando dois primos, conhecidos como Vitão e companhia, estavam brincando com uma bolinha saltitante e caixas. A partir disso, criaram regras simples e competitivas, transformando a atividade em um jogo." },
            { t: "3. OBJETIVO DO JOGO", d: "O objetivo do jogo é acertar a bolinha na linha do adversário, fazendo com que ele perca pontos. Cada jogador começa com 10 pontos, e perde 1 ponto sempre que a bolinha lançada pelo oponente atinge sua linha." },
            { t: "4. MATERIAIS NECESSÁRIOS", d: "• 2 caixas (pequenas ou médias)\n• 1 bolinha saltitante\n• Espaço plano para jogar" },
            { t: "5. REGRAS DO JOGO", d: "1) Cada jogador começa com 10 pontos.\n2) O jogo é disputado entre 2 jogadores.\n3) Os jogadores ficam em lados opostos.\n4) O objetivo é lançar a bolinha para que ela atinja a linha do adversário.\n5) Quando a bolinha acerta entre ou sobre a linha do jogador rival, ele perde 1 ponto (isso é chamado de \"B.O.\").\n6) Vence quem fizer o adversário chegar a 0 pontos primeiro." },
            { t: "6. CARACTERÍSTICAS DO JOGO", d: "A brincadeira mistura habilidades como coordenação motora, precisão e estratégia. Além disso, é uma atividade acessível, pois utiliza poucos materiais e pode ser praticada em diferentes espaços." },
            { t: "7. SEMELHANÇAS COM OUTROS ESPORTES", d: "O jogo apresenta semelhanças com esportes como o tênis de mesa (pingue-pongue), devido ao uso de uma bolinha e trocas rápidas, e com o beisebol, por envolver estratégia e precisão nos lançamentos." },
            { t: "8. CONCLUSÃO", d: "Conclui-se que a brincadeira \"Caixa e Bola\" é uma forma criativa e divertida de atividade física, incentivando a interação social, a competição saudável e o desenvolvimento de habilidades motoras." },
            { t: "9. POSSÍVEIS VARIAÇÕES", d: "O jogo pode ser adaptado para mais jogadores ou diferentes tamanhos de campo, tornando a brincadeira ainda mais dinâmica." }
        ];

        const grid = document.getElementById('grid');
        dados.forEach((item, i) => {
            grid.innerHTML += `<div class="card" onclick="openModal(${i})"><h3>${item.t}</h3><p>${item.d.substring(0, 65)}...</p></div>`;
        });

        function playMusic() {
            const music = document.getElementById('bg-music');
            if (music.paused) music.play().catch(() => {});
        }

        // Lógica do Typewriter
        let typewriterTimeout;
        function typeWriter(text, element, speed = 15) {
            let i = 0;
            element.innerHTML = ""; // Limpa o texto anterior
            clearTimeout(typewriterTimeout); // Para qualquer escrita anterior

            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typewriterTimeout = setTimeout(typing, speed);
                }
            }
            typing();
        }

        let currentSlide = 0;
        function changeSlide(target) {
            if (target === currentSlide) return;
            const current = document.getElementById(`slide-${currentSlide}`);
            const next = document.getElementById(`slide-${target}`);
            const sprite = document.getElementById('hornet-sprite');
            
            next.classList.add('next');
            sprite.style.display = 'block';
            let posX = -300;
            
            const anim = setInterval(() => {
                const f = framesRun[Math.floor(Date.now()/80) % framesRun.length];
                sprite.src = `hornet/${f}`;
            }, 80);

            const move = setInterval(() => {
                posX += 25;
                sprite.style.left = posX + 'px';
                let percent = (posX / window.innerWidth) * 100;
                next.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;

                if (posX > window.innerWidth + 300) {
                    clearInterval(anim); clearInterval(move);
                    current.classList.remove('active');
                    next.classList.remove('next');
                    next.classList.add('active');
                    sprite.style.display = 'none';
                    currentSlide = target;
                }
            }, 16);
        }

        let mIdx = 0;
        function openModal(i) {
            mIdx = i;
            document.getElementById('m-title').innerText = dados[i].t;
            const textElement = document.getElementById('m-text');
            document.getElementById('modal').style.display = 'flex';
            
            // Inicia o efeito de máquina de escrever
            typeWriter(dados[i].d, textElement);
        }

        function closeModal() { 
            clearTimeout(typewriterTimeout);
            document.getElementById('modal').style.display = 'none'; 
        }
        
        function nextModal() {
            mIdx = (mIdx + 1) % dados.length;
            openModal(mIdx);
        }
    </script>
</body>
</html>
